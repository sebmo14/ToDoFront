<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gestionar categorías de tareas">
  <title>ToDo App — Categorías</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><span>📋</span> ToDo App</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tareas.html">Tareas</a></li>
        <li><a href="crear.html">Crear</a></li>
        <li><a href="categorias.html" class="active">Categorías</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>🏷️ Categorías</h1>
    </div>

    <div class="cat-form" id="cat-form">
      <input type="text" id="cat-nombre" placeholder="Nombre de la categoría" required>
      <input type="color" id="cat-color" value="#4f46e5">
      <button class="btn btn-primary btn-sm" id="btn-add-cat">➕ Añadir</button>
    </div>

    <div id="spinner" class="spinner" style="display:none;"></div>
    <div id="cat-grid" class="cat-grid"></div>
    <div id="empty" class="empty-state" style="display:none;">
      <div class="icon">🏷️</div>
      <p>No hay categorías aún. ¡Crea una!</p>
    </div>
  </div>

  <script src="js/categorias.js"></script>
</body>
</html>
