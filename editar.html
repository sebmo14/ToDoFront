<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Editar tarea existente">
    <title>ToDo App — Editar Tarea</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo"><span>📋</span> ToDo App</a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="tareas.html" class="active">Tareas</a></li>
                <li><a href="crear.html">Crear</a></li>
                <li><a href="categorias.html">Categorías</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div id="spinner" class="spinner"></div>
        <div class="form-card" id="form-wrapper" style="display:none;">
            <h1>✏️ Editar Tarea</h1>
            <form id="form-editar">
                <div class="form-group">
                    <label for="titulo">Título *</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion"></textarea>
                </div>
                <div class="form-group">
                    <label for="prioridad">Prioridad</label>
                    <select id="prioridad">
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <input type="text" id="categoria">
                </div>
                <div class="form-group">
                    <label for="completada">Estado</label>
                    <select id="completada">
                        <option value="false">Pendiente</option>
                        <option value="true">Completada</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Actualizar</button>
                    <a href="tareas.html" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/editar.js"></script>
</body>

</html>
