<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de tareas pendientes y completadas">
    <title>ToDo App — Tareas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo"><span>📋</span> ToDo App</a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="tareas.html" class="active">Tareas</a></li>
                <li><a href="crear.html">Crear</a></li>
                <li><a href="categorias.html">Categorías</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📄 Mis Tareas</h1>
            <a href="crear.html" class="btn btn-primary btn-sm">➕ Nueva</a>
        </div>

        <div class="filter-bar" style="margin-bottom: 20px;">
            <label for="filter-categoria">Filtrar por Categoría:</label>
            <select id="filter-categoria" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">Todas</option>
            </select>
        </div>

        <div id="spinner" class="spinner"></div>
        <div id="task-list" class="task-list" style="display:none;"></div>
        <div id="empty" class="empty-state" style="display:none;">
            <div class="icon">📭</div>
            <p>No hay tareas aún. ¡Crea una!</p>
        </div>
    </div>

    <script src="js/tareas.js"></script>
</body>

</html>
