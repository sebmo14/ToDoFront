<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detalle de tarea">
    <title>ToDo App — Detalle</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo"><span>📋</span> ToDo App</a>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="tareas.html" class="active">Tareas</a></li>
                <li><a href="crear.html">Crear</a></li>
                <li><a href="categorias.html">Categorías</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div id="spinner" class="spinner"></div>
        <div id="detail" class="detail-card" style="display:none;">
            <h1 id="titulo"></h1>
            <div class="detail-row">
                <span class="detail-label">Descripción</span>
                <span id="descripcion">—</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Estado</span>
                <span id="estado"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Prioridad</span>
                <span id="prioridad"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Categoría</span>
                <span id="categoria"></span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Creada</span>
                <span id="creada"></span>
            </div>
            <div class="detail-actions">
                <a id="btn-editar" href="#" class="btn btn-primary btn-sm">✏️ Editar</a>
                <button id="btn-eliminar" class="btn btn-danger btn-sm">🗑️ Eliminar</button>
                <a href="tareas.html" class="btn btn-secondary btn-sm">← Volver</a>
            </div>
        </div>
    </div>

    <script src="js/detalle.js"></script>
</body>

</html>
